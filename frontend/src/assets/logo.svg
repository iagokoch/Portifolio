<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" stroke="url(#logoGradient)" stroke-width="3" fill="none" />
  
  <!-- Code brackets - left -->
  <path d="M 30 30 L 20 50 L 30 70" stroke="url(#logoGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Code brackets - right -->
  <path d="M 70 30 L 80 50 L 70 70" stroke="url(#logoGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Forward slash in the middle -->
  <line x1="55" y1="30" x2="45" y2="70" stroke="url(#innerGradient)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Decorative dots -->
  <circle cx="50" cy="15" r="3" fill="#F97316" />
  <circle cx="85" cy="50" r="2.5" fill="#06B6D4" />
  <circle cx="15" cy="50" r="2.5" fill="#3B82F6" />
</svg>
